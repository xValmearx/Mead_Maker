{% extends "base.html" %}

{% block title %}
	Home
{% endblock title %}

{% block content %}

<div class="section hero"> 
	<img class="card-icon" src="/static/icons/cheers.svg" alt="$cheers icon">
	<h1>lets begin</h1>
</div>

<div class="section">

	<div class="card-grid">
		<mead-card 
    name="Traditional Mead" 
    type="traditional" 
    icon="/static/icons/traditional.svg"
    dialog="The original style of mead, made primarily from honey, water, and yeast. Traditional mead showcases the natural flavors and aromas of the honey used."></mead-card>

<mead-card 
    name="Sack Mead" 
    type="sack"
    icon="/static/icons/sack.svg"
    dialog="A rich, full-bodied mead made with extra honey, resulting in a higher alcohol content and a sweeter finish."></mead-card>

<mead-card 
    name="Braggot Mead" 
    type="braggot" 
    icon="/static/icons/braggot.svg"
    dialog="A hybrid of mead and beer, brewed with both honey and malted grains for a balance of sweetness and malt character."></mead-card>

<mead-card 
    name="Spiced Mead" 
    type="spiced"
    icon="/static/icons/spiced.svg"
    dialog="Also called Metheglin, this mead is flavored with herbs, spices, or botanicals such as cinnamon, cloves, vanilla, or ginger."></mead-card>

<mead-card 
    name="Blueberry Mead" 
    type="blueberry"
    icon="/static/icons/blueberry.svg"
    dialog="A melomel made with blueberries, offering deep berry flavors, subtle sweetness, and a vibrant purple hue."></mead-card>

<mead-card 
    name="Blackberry Mead" 
    type="blackberry"
    icon="/static/icons/blackberry.svg"
    dialog="A fruit mead featuring blackberries that provide bold berry notes, gentle tartness, and a rich, dark color."></mead-card>

<mead-card 
    name="Strawberry Mead" 
    type="strawberry"
    icon="/static/icons/strawberry.svg"
    dialog="A refreshing melomel made with strawberries, known for its bright fruit aroma and light, sweet finish."></mead-card>

<mead-card 
    name="Grape Mead" 
    type="grape" 
    icon="/static/icons/grape.svg"
    dialog="Also known as Pyment, this mead combines honey with grapes or grape juice, blending the qualities of mead and wine."></mead-card>

<mead-card 
    name="Orange Mead" 
    type="orange" 
    icon="/static/icons/orange.svg"
    dialog="A citrus-forward mead made with oranges or orange zest, delivering bright, fresh flavors with balanced acidity."></mead-card>

<mead-card 
    name="Lavender Mead"
    type="lavender" 
    icon="/static/icons/lavender.svg"
    dialog="A floral mead infused with lavender blossoms, creating delicate aromas and a smooth, aromatic finish."></mead-card>

<mead-card 
    name="Cherry Mead" 
    type="cherry" 
    icon="/static/icons/cherry.svg"
    dialog="A melomel crafted with cherries, producing a vibrant mead with sweet, tart, and slightly almond-like notes."></mead-card>

<mead-card 
    name="Cider Mead" 
    type="cider" 
    icon="/static/icons/apple.svg"
    dialog="Also known as Cyser, this mead is made with apple cider instead of water, combining crisp apple flavors with honey sweetness."></mead-card>

	</div>

</div>

{% endblock content %}
