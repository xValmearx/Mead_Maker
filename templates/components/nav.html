<nav>
    <a class="button-black" href="{% url 'home' %}">Home</a>

    {% if user.is_authenticated %}

    <a class="button-black" href="{% url 'mead_list' %}">

        </a>

        <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}

        <a class="button-black" href="{% url 'login' %}">Log In</a>
        <a class="button-black" href="{% url 'signup' %}">Sign Up</a>

    {% endif %}
</nav>

<div style="height: 8vh;"></div>
